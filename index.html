<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Live test ring</title>
    <style>
        body{
            font-family: sans-serif;
            padding: 20px;
            background: #121212;
            color:#fff
        }
        #log{
            background: #000;
            padding: 10px;
            height: 300px;
            overflow-y:scroll ;
            border: 1px solid #333;

        }
        .status-on{color:#00ff00}
        .status-off{color:#ff0000}

    </style>
</head>
<body>
    <h1>WebSocket BroadCast Console</h1>
    <p id="status" class="status-off">Connection ...</p>
    <form action="" id="message-input">
        <input id="message-input" type="text" placeholder="Send cargo..." required/>
        <button type="Submit">Deploy message</button>


    </form>
    <h3>Live Stream Logs</h3>
    <pre id="log"></pre>
    
</body>
<script>
    const statusE1=document.getElementById("status");
    const log=document.getElementById("log");
    const input=document.getElementById("message-input");

    //1. Initiate the HandShake
    const socket=new WebSocket('ws://localhost:8080');
    const appendLog=(label,message)=>{
        const entry=`${new Date().toLocaleDateString()}${label}${message}\n`
        log.textContent=entry+log.textContent;

    }
    socket.addEventListener('open',()=>{
        statusE1.textContent='Connected: ws://localhost:8080'
        statusE1.className='status-on'
        appendLog('[SYSTEM]','TUNNEL ESTABLISHED');

    })
    socket.addEventListener('close',()=>{
        statusE1.textContent='DISConnected: ws://localhost:8080'
        statusE1.className='status-oFF'
        appendLog('[SYSTEM]','TUNNEL Collapsed');
        
    })
    socket.addEventListener('message',(e)=>{
        appendLog('[RECEIVED]',e.data);

    })
    document.getElementById('message-form').addEventListener('submit',(e)=>{
        e.preventDefault();
        if(socket.readyState===WebSocket.OPEN){
            appendLog(`[ERROR]`,'No active tunnedl found.');

        }
        const msg=input.value.trim();
        socket.send(msg);
        appendLog('[SENT]',msg);
        input.value='';
    })
</script>
</html>
